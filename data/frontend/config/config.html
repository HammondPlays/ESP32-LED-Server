<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Configuration</title>
    <link rel="stylesheet" href="styles-desktop.css" />
    <link rel="stylesheet" href="styles-mobile.css" />
</head>

<body>
    <header>
        <h1>LED Configuration</h1>
    </header>
    <h3>Select LED-Mode</h3>
    <div id="ledModeContainer" class="ledModeContainer">
        <!-- Buttons will be dynamically added here -->
    </div>
    <div id="ledModeParameters" style="display: block">
        <div id="LED_COUNT" style="display: none">
            <label for="ledCountInput">Enter LED Count:</label>
            <input id="ledCountInput" type="number" min="1" max="500" step="1" value="50" inputmode="numeric">
            <span id="ledCountValue">50</span>
        </div>
        <div id="SHAPE_SIZE" style="display: none">
            <label for="shapeSizeInput">Enter LED Count per Shape:</label>
            <input id="shapeSizeInput" type="number" min="1" max="100" step="1" value="6" inputmode="numeric">
            <span id="shapeSizeValue">6</span>
        </div>
        <div id="SHAPE_COUNT" style="display: none">
            <label for="shapeCountInput">Ender amount of Shapes:</label>
            <input id="shapeCountInput" type="number" min="1" max="100" step="1" value="6" inputmode="numeric">
            <span id="shapeCountValue">6</span>
        </div>
    </div>
    <div class="controls">
        <button id="ledModeSubmit">Submit</button>
    </div>
    <script src="config/app.js"></script>
</body>

</html>
