  <body>
    <header>
      <h1>LED Controll</h1>

      <div id="modeOptions" style="display: none">

        <div id="mode1Options" style="display: none">
          <p>Options for Mode 1</p>
          <!-- Add specific options for Mode 1 here -->
        </div>
        <div id="mode2Options" style="display: none">
          <p>Options for Mode 2</p>
          <!-- Add specific options for Mode 2 here -->
        </div>
      </div>
    </main>
    <footer>
      <p>&copy; 2025 LED Controll</p>
    </footer>
    <script src="app.js"></script>
